# Runs the upstream vercel/workflow e2e test suite against local Restate builds
# and community worlds (MongoDB, Redis) for comparison.
#
# Architecture:
#   build job     → builds local package + upstream, shares both via actions/cache
#   e2e-* jobs    → restore caches, install world, run tests
#   summary job   → aggregate results, post PR comment

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      world:
        description: "World to test"
        type: choice
        options: ["all", "restate", "mongodb", "redis"]
        default: "all"
      upstream-ref:
        description: "vercel/workflow git ref to test against"
        type: string
        default: "main"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REF: ${{ inputs.upstream-ref || 'main' }}
  APP_NAME: nextjs-turbopack
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Build local package + clone & build upstream
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      upstream-cache-key: ${{ steps.upstream-meta.outputs.cache-key }}
      tarball-cache-key: ${{ steps.tarball-meta.outputs.cache-key }}
      upstream-pnpm-version: ${{ steps.upstream-meta.outputs.pnpm-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Pack @restatedev/workflow tarball
        run: |
          mkdir -p .tarballs
          cd packages/libs/workflow
          pnpm pack --pack-destination ../../../.tarballs
          cd ../../..
          echo "::group::Tarballs"
          ls -lh .tarballs/
          echo "::endgroup::"

      - name: Tarball metadata
        id: tarball-meta
        run: echo "cache-key=tarballs-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Cache tarballs
        uses: actions/cache/save@v4
        with:
          path: .tarballs
          key: ${{ steps.tarball-meta.outputs.cache-key }}

      - name: Clone upstream
        run: git clone --depth=1 --branch ${{ env.UPSTREAM_REF }} https://github.com/vercel/workflow.git .upstream

      - name: Upstream metadata
        id: upstream-meta
        run: |
          SHA=$(git -C .upstream rev-parse HEAD)
          echo "cache-key=upstream-build-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Upstream commit: $SHA"
          PNPM_VERSION=$(node -e "const pm = require('./.upstream/package.json').packageManager || ''; console.log(pm.split('@')[1] || '10.14.0')")
          echo "pnpm-version=${PNPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Upstream pnpm version: $PNPM_VERSION"

      - name: Restore upstream cache
        id: upstream-cache
        uses: actions/cache@v4
        with:
          path: .upstream
          key: ${{ steps.upstream-meta.outputs.cache-key }}

      - name: Install & build upstream
        if: steps.upstream-cache.outputs.cache-hit != 'true'
        working-directory: .upstream
        run: |
          PNPM_VERSION=$(node -e "const pm = require('./package.json').packageManager || ''; console.log(pm.split('@')[1] || '10.14.0')")
          npm i -g "pnpm@${PNPM_VERSION}"
          pnpm install --frozen-lockfile
          pnpm turbo run build --filter='!./workbench/*'

      - name: Trim upstream cache
        if: steps.upstream-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf .upstream/.git
          find .upstream -name node_modules -type d -prune -exec rm -rf {} +
          echo "Cache size after trim:"
          du -sh .upstream

  # ---------------------------------------------------------------------------
  # E2E — Restate
  # ---------------------------------------------------------------------------
  e2e-restate:
    name: E2E - Restate
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.world == 'all' ||
      inputs.world == 'restate'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      restate:
        image: docker.io/restatedev/restate:1.5.3
        ports:
          - 8080:8080
          - 9070:9070
        env:
          RESTATE_DEFAULT_RETRY_POLICY__ON_MAX_ATTEMPTS: pause
        options: >-
          --health-cmd "curl -f http://localhost:9070/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Restore upstream
        uses: actions/cache/restore@v4
        with:
          path: .upstream
          key: ${{ needs.build.outputs.upstream-cache-key }}
          fail-on-cache-miss: true

      - name: Restore tarballs
        uses: actions/cache/restore@v4
        with:
          path: .tarballs
          key: ${{ needs.build.outputs.tarball-cache-key }}
          fail-on-cache-miss: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.build.outputs.upstream-pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: .upstream/pnpm-lock.yaml

      - name: Install upstream dependencies
        working-directory: .upstream
        run: pnpm install --frozen-lockfile

      - name: Install Restate world
        working-directory: .upstream
        run: |
          TARBALL=$(readlink -f ../.tarballs/restatedev-workflow-*.tgz | head -1)
          echo "Installing $TARBALL"
          pnpm --filter ${{ env.APP_NAME }} add "$TARBALL"

      - name: Patch workbench for Restate
        run: node scripts/patch-upstream-workbench.cjs .upstream/workbench/${{ env.APP_NAME }}

      - name: Resolve symlinks
        working-directory: .upstream
        run: |
          if [[ -f scripts/resolve-symlinks.sh ]]; then
            CI=true bash scripts/resolve-symlinks.sh workbench/${{ env.APP_NAME }}
          fi

      - name: Run E2E tests
        working-directory: .upstream
        env:
          NODE_OPTIONS: "--enable-source-maps"
          DEPLOYMENT_URL: "http://localhost:3000"
          RESTATE_INGRESS: "http://localhost:8080"
          WORKFLOW_PUBLIC_MANIFEST: "1"
          WORKFLOW_SERVICE_URL: "http://localhost:3000"
        run: |
          cd workbench/${{ env.APP_NAME }} && pnpm dev > ../../server-restate.log 2>&1 &
          echo "Waiting for dev server..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Dev server ready"
              break
            fi
            sleep 2
          done

          echo "Registering with Restate..."
          curl -sf -X POST http://localhost:9070/deployments \
            -H 'content-type: application/json' \
            -d '{"uri": "http://localhost:3000/.restate-well-known"}'

          cd ../..
          pnpm vitest run packages/core/e2e/e2e.test.ts \
            --reporter=default --reporter=json \
            --outputFile=e2e-restate.json || EXIT_CODE=$?
          exit ${EXIT_CODE:-0}

      - name: Show server logs on failure
        if: failure()
        working-directory: .upstream
        run: echo "=== Dev server logs ===" && tail -200 server-restate.log || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-restate
          path: |
            .upstream/e2e-restate.json
            .upstream/server-restate.log
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # E2E — MongoDB
  # ---------------------------------------------------------------------------
  e2e-mongodb:
    name: E2E - MongoDB
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.world == 'all' ||
      inputs.world == 'mongodb'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Restore upstream
        uses: actions/cache/restore@v4
        with:
          path: .upstream
          key: ${{ needs.build.outputs.upstream-cache-key }}
          fail-on-cache-miss: true

      - name: Restore tarballs
        uses: actions/cache/restore@v4
        with:
          path: .tarballs
          key: ${{ needs.build.outputs.tarball-cache-key }}
          fail-on-cache-miss: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.build.outputs.upstream-pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: .upstream/pnpm-lock.yaml

      - name: Install upstream dependencies
        working-directory: .upstream
        run: pnpm install --frozen-lockfile

      - name: Install MongoDB world
        working-directory: .upstream
        run: pnpm --filter ${{ env.APP_NAME }} add @workflow-worlds/mongodb

      - name: Resolve symlinks
        working-directory: .upstream
        run: |
          if [[ -f scripts/resolve-symlinks.sh ]]; then
            CI=true bash scripts/resolve-symlinks.sh workbench/${{ env.APP_NAME }}
          fi

      - name: Run E2E tests
        working-directory: .upstream
        env:
          NODE_OPTIONS: "--enable-source-maps"
          DEPLOYMENT_URL: "http://localhost:3000"
          WORKFLOW_TARGET_WORLD: "@workflow-worlds/mongodb"
          WORKFLOW_MONGODB_URI: "mongodb://localhost:27017"
          WORKFLOW_MONGODB_DATABASE_NAME: "workflow"
          WORKFLOW_PUBLIC_MANIFEST: "1"
          WORKFLOW_SERVICE_URL: "http://localhost:3000"
        run: |
          cd workbench/${{ env.APP_NAME }} && pnpm dev > ../../server-mongodb.log 2>&1 &
          echo "Waiting for dev server..." && sleep 15
          pnpm vitest run packages/core/e2e/e2e.test.ts \
            --reporter=default --reporter=json \
            --outputFile=e2e-mongodb.json || EXIT_CODE=$?
          exit ${EXIT_CODE:-0}

      - name: Show server logs on failure
        if: failure()
        working-directory: .upstream
        run: echo "=== Dev server logs ===" && tail -200 server-mongodb.log || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-mongodb
          path: |
            .upstream/e2e-mongodb.json
            .upstream/server-mongodb.log
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # E2E — Redis
  # ---------------------------------------------------------------------------
  e2e-redis:
    name: E2E - Redis
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.world == 'all' ||
      inputs.world == 'redis'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Restore upstream
        uses: actions/cache/restore@v4
        with:
          path: .upstream
          key: ${{ needs.build.outputs.upstream-cache-key }}
          fail-on-cache-miss: true

      - name: Restore tarballs
        uses: actions/cache/restore@v4
        with:
          path: .tarballs
          key: ${{ needs.build.outputs.tarball-cache-key }}
          fail-on-cache-miss: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.build.outputs.upstream-pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: .upstream/pnpm-lock.yaml

      - name: Install upstream dependencies
        working-directory: .upstream
        run: pnpm install --frozen-lockfile

      - name: Install Redis world
        working-directory: .upstream
        run: pnpm --filter ${{ env.APP_NAME }} add @workflow-worlds/redis

      - name: Resolve symlinks
        working-directory: .upstream
        run: |
          if [[ -f scripts/resolve-symlinks.sh ]]; then
            CI=true bash scripts/resolve-symlinks.sh workbench/${{ env.APP_NAME }}
          fi

      - name: Run E2E tests
        working-directory: .upstream
        env:
          NODE_OPTIONS: "--enable-source-maps"
          DEPLOYMENT_URL: "http://localhost:3000"
          WORKFLOW_TARGET_WORLD: "@workflow-worlds/redis"
          WORKFLOW_REDIS_URI: "redis://localhost:6379"
          WORKFLOW_PUBLIC_MANIFEST: "1"
          WORKFLOW_SERVICE_URL: "http://localhost:3000"
        run: |
          cd workbench/${{ env.APP_NAME }} && pnpm dev > ../../server-redis.log 2>&1 &
          echo "Waiting for dev server..." && sleep 15
          pnpm vitest run packages/core/e2e/e2e.test.ts \
            --reporter=default --reporter=json \
            --outputFile=e2e-redis.json || EXIT_CODE=$?
          exit ${EXIT_CODE:-0}

      - name: Show server logs on failure
        if: failure()
        working-directory: .upstream
        run: echo "=== Dev server logs ===" && tail -200 server-redis.log || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-redis
          path: |
            .upstream/e2e-redis.json
            .upstream/server-redis.log
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Summary — aggregate results from all worlds
  # ---------------------------------------------------------------------------
  summary:
    name: E2E Summary
    needs: [e2e-restate, e2e-mongodb, e2e-redis]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-results-*
          path: e2e-results
          merge-multiple: true

      - name: Generate summary
        id: summary
        run: |
          mkdir -p e2e-results
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          node scripts/aggregate-e2e-results.cjs e2e-results \
            --run-url "$RUN_URL" \
            >> "$GITHUB_STEP_SUMMARY" || true
          if [ ! -s e2e-results/e2e-summary.md ]; then
            cat > e2e-results/e2e-summary.md <<EOF
          ## E2E Test Results

          E2E jobs failed before producing test results. [View workflow run]($RUN_URL)
          EOF
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: e2e-test-results
          path: e2e-results/e2e-summary.md
